name: 🚀 Main Stage Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: 🎹 Stage Entrance (Checkout)
        uses: actions/checkout@v4

      - name: 🥁 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: 📦 Restore pnpm & next cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-pnpm-

      - name: 🎹 Tuning (Install Dependencies)
        run: pnpm install --frozen-lockfile

      - name: 🔐 Restore Secret Environment
        run: |
          echo "GITHUB_TOKEN=${{ secrets.MIKU_GITHUB_TOKEN }}" > .env.local
          echo "STATUS_TOKEN=${{ secrets.STATUS_TOKEN }}" >> .env.local
          echo "무대 비밀 장치(.env.local) 복구 완료! 🤫✨"

      - name: 🎤 Show Production (Build)
        run: pnpm build

      - name: ✨ Start Performance (Start App)
        run: |
          pm2 delete 01_miku-dashboard || true
          pm2 start "pnpm start --port 23000" --name "01_miku-dashboard"
