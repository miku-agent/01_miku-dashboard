name: 🎻 Integration Test Harmony

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: self-hosted
    steps:
      - name: 🎹 Stage Entrance (Checkout)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: 🥁 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: 📦 Restore pnpm cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 🎹 Tuning (Install Dependencies)
        run: pnpm install --frozen-lockfile

      - name: 🔐 Restore Secret Environment
        run: |
          echo "GITHUB_TOKEN=${{ secrets.MIKU_GITHUB_TOKEN }}" > .env.local
          echo "STATUS_TOKEN=${{ secrets.STATUS_TOKEN }}" >> .env.local

      - name: 🎻 Rehearsal (Run Tests)
        run: pnpm test
