name: 🎻 Integration Test Harmony

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: self-hosted
    steps:
      - name: 🎹 Stage Entrance (Checkout)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: 🥁 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: 🎹 Tuning (Install Dependencies)
        run: pnpm install

      - name: 🎻 Rehearsal (Run Tests)
        run: pnpm test
